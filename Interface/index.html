<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problema das 8 Rainhas</title>

    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <img src="assets/queen.png" class="queen-side left-queen">
    <img src="assets/queen.png" class="queen-side right-queen">
    <main class="container">
        <h1>Trabalho de Inteligência Artificial - P1</h1>
        <h2>Problema das 8 Rainhas</h2>

        <div class="boards-container">

            <div class="board-wrapper">
                <h3>Estado Inicial</h3>
            <div id="initialBoard" class="board"></div>
            </div>

            <div class="board-wrapper">
                <h3>Solução</h3>
                <div id="solutionBoard" class="board"></div>
            </div>

        </div>

        <div>
          <button id="iniciarEstados">
                Iniciar Estados
            </button>
            <button id="solveBtnHill">
                Iniciar solução Hill Climb
            </button>
            <button id="solveBtnA">
                Iniciar solução A*
            </button>  
        </div>
        

    </main>

    <script src="js/script.js"></script>
</body>
</html>
