<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problema das 8 Rainhas</title>

    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <img src="assets/queen.png" class="queen-side left-queen">
    <img src="assets/queen.png" class="queen-side right-queen">
    <main class="container">
        <h1>Trabalho de Inteligência Artificial - P1</h1>
        <h2>Problema das 8 Rainhas</h2>

        <div class="boards-container">

            <div class="board-wrapper">
                <h3>Estado Inicial</h3>
            <div id="initialBoard" class="board"></div>
            </div>

            <div class="board-wrapper">
                <h3>Solução</h3>
                <div id="solutionBoard" class="board"></div>
            </div>

        </div>

        <div class="buttons-container">
          <button id="iniciarEstados">
                Iniciar Estados
            </button>
            <button id="solveBtnHill">
                Iniciar solução Hill Climb
            </button>
            <button id="solveBtnA">
                Iniciar solução A*
            </button>  
        </div>
        
        <section id="metricas" class="metricas-container">

            <h2>Métricas da Execução</h2>

            <div class="metricas-grid">

                <div class="metrica-card">
                    <span class="titulo">Status</span>
                    <span id="status">-</span>
                </div>

                <div class="metrica-card">
                    <span class="titulo">Tempo de execução</span>
                    <span id="tempoExecucao">-</span>
                </div>

                <div class="metrica-card">
                    <span class="titulo">Reinícios</span>
                    <span id="reinicios">-</span>
                </div>
            </div>
            <div class="metricas-grid">
                <div class="metrica-card">
                    <span class="titulo">Nós expandidos</span>
                    <span id="nosExpandidos">-</span>
                </div>

                <div class="metrica-card">
                    <span class="titulo">Nós gerados</span>
                    <span id="nosGerados">-</span>
                </div>
            </div>

        </section>

    </main>

    <script src="js/script.js"></script>
</body>
</html>
